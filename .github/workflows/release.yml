name: Publish Package to NPM Registry

on:
  release:
    types: [published] # Se déclenche uniquement quand tu publies une Release sur GitHub

jobs:
  publish:
    name: Production Release Setup
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install full workspace dependencies
        run: npm ci

      - name: Strict verification of test suite
        run: npx vitest run

      - name: Build production artifact
        run: npm run build

      - name: Publish package to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}