name: Code Quality & Automation

# Déclencheurs : Le serveur virtuel se lance à chaque push ou pull request sur main/master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Track Security & Core Architecture
    runs-on: ubuntu-latest

    steps:
      # 1. Télécharge le code du dépôt sur le serveur virtuel
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Installe Node.js de manière isolée et configure le cache npm
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Installe proprement les dépendances sans modifier le package-lock.json
      - name: Install dependencies
        run: npm ci

      # 4. Exécute la matrice stricte de tes 35+ tests unitaires (Vitest)
      - name: Execute strict test suite
        run: npm run test

      # 5. Valide que le compilateur (Tsup) génère un build de production valide
      - name: Validate production build
        run: npm run build